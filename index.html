<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSHU CAR CHASE | PRO EDITION</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Orbitron:wght@400;900&display=swap');
        
        body {
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-canvas { width: 100vw; height: 100vh; display: block; }

        .neon-text-red { text-shadow: 0 0 15px #ff0040, 0 0 30px #ff0040; }
        .neon-text-blue { text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff; }
        
        .glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Portrait Force */
        @media screen and (orientation: portrait) {
            #portrait-force { display: flex !important; }
            #ui-layer { display: none; }
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .ctrl-btn:active {
            transform: scale(0.9);
            background: rgba(255, 0, 64, 0.4);
            border-color: #ff0040;
        }

        .camera-btn {
            background: rgba(0, 242, 255, 0.2);
            border: 1px solid #00f2ff;
            color: #00f2ff;
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <!-- Sound UI (Invisible but used) -->
    <div class="hidden">
        <audio id="snd-engine" loop src="https://assets.mixkit.co/sfx/preview/mixkit-car-engine-loop-2539.mp3"></audio>
        <audio id="snd-siren" loop src="https://assets.mixkit.co/sfx/preview/mixkit-police-siren-1641.mp3"></audio>
        <audio id="snd-crash" src="https://assets.mixkit.co/sfx/preview/mixkit-car-heavy-crash-936.mp3"></audio>
        <audio id="snd-coin" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chime-2064.mp3"></audio>
    </div>

    <!-- UI LAYER -->
    <div id="ui-layer" class="fixed inset-0 z-50 pointer-events-none">
        
        <!-- Loading Screen -->
        <div id="screen-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950 pointer-events-auto">
            <h1 class="text-6xl font-black text-white italic tracking-tighter mb-4 neon-text-red">ANSHU</h1>
            <div class="w-64 h-1 bg-zinc-800 rounded-full overflow-hidden">
                <div id="load-bar" class="h-full bg-red-600 w-0 transition-all duration-300"></div>
            </div>
            <p id="load-status" class="text-zinc-500 text-[10px] mt-4 uppercase tracking-[0.3em]">Checking GLB Models...</p>
        </div>

        <!-- Main Menu -->
        <div id="screen-menu" class="absolute inset-0 flex flex-col items-center justify-center hidden pointer-events-auto">
            <div class="glass p-10 rounded-[2rem] flex flex-col items-center max-w-sm w-full">
                <h1 class="text-5xl font-black italic text-white mb-2 neon-text-red">ANSHU</h1>
                <p class="text-cyan-400 text-xs tracking-[0.6em] uppercase mb-10">Pro Car Chase</p>
                
                <button id="btn-start" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-red-600 hover:text-white transition-all transform hover:scale-105 uppercase tracking-widest mb-4">
                    ▶ Start Engine
                </button>
                
                <div class="grid grid-cols-2 gap-3 w-full">
                    <button id="btn-fs" class="glass text-white py-3 rounded-lg text-[10px] uppercase font-bold border-zinc-700">Fullscreen</button>
                    <button id="btn-mode" class="glass text-white py-3 rounded-lg text-[10px] uppercase font-bold border-zinc-700">Level: Easy</button>
                </div>
            </div>
        </div>

        <!-- In-Game HUD -->
        <div id="hud" class="absolute inset-x-0 top-0 p-6 flex justify-between items-start hidden">
            <div class="flex flex-col gap-2">
                <div class="glass px-5 py-2 rounded-xl border-l-4 border-yellow-500">
                    <p class="text-zinc-400 text-[9px] uppercase font-bold">Collected Coins</p>
                    <p id="hud-coins" class="text-2xl font-black text-yellow-400">0</p>
                </div>
                <div class="glass px-5 py-2 rounded-xl border-l-4 border-cyan-500">
                    <p class="text-zinc-400 text-[9px] uppercase font-bold">Distance</p>
                    <p id="hud-dist" class="text-xl font-bold text-white">0 m</p>
                </div>
            </div>

            <div class="flex flex-col items-end gap-3">
                <button id="btn-cam-switch" class="camera-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase pointer-events-auto">📷 View</button>
                <div class="glass px-6 py-3 rounded-2xl border-r-4 border-red-600 text-right">
                    <p class="text-zinc-400 text-[9px] uppercase font-bold">Speed</p>
                    <p id="hud-speed" class="text-4xl font-black italic text-white">0</p>
                    <p class="text-zinc-500 text-[10px] uppercase">KM/H</p>
                </div>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div id="controls-mobile" class="absolute inset-x-0 bottom-10 px-10 flex justify-between items-end hidden pointer-events-auto">
            <div class="flex gap-6">
                <div id="ctrl-left" class="ctrl-btn w-24 h-24 text-4xl text-white">⬅</div>
                <div id="ctrl-right" class="ctrl-btn w-24 h-24 text-4xl text-white">➡</div>
            </div>
            <div id="ctrl-brake" class="ctrl-btn w-32 h-20 text-red-500 font-black uppercase italic">Brake</div>
        </div>

        <!-- Game Over -->
        <div id="screen-gameover" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 hidden pointer-events-auto">
            <h2 class="text-7xl font-black italic text-red-600 mb-2 neon-text-red">BUSTED</h2>
            <p class="text-white text-lg tracking-widest uppercase mb-10">The police caught you!</p>
            
            <div class="glass p-8 rounded-3xl mb-8 w-64 text-center">
                <p class="text-zinc-400 uppercase text-xs">Total Score</p>
                <p id="final-score" class="text-4xl font-black text-white">0</p>
            </div>

            <button id="btn-retry" class="bg-red-600 text-white font-black px-12 py-4 rounded-full text-xl hover:bg-white hover:text-black transition-all transform active:scale-95 uppercase">
                Try Again
            </button>
        </div>

    </div>

    <!-- Portrait Warning -->
    <div id="portrait-force" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center text-center p-10">
        <div class="w-20 h-20 border-4 border-white rounded-xl animate-bounce flex items-center justify-center mb-6">
            <span class="text-4xl">🔄</span>
        </div>
        <h2 class="text-white text-2xl font-black uppercase tracking-widest">Rotate Device</h2>
        <p class="text-zinc-500 mt-2">Landscape mode is required to drive the car!</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        /* 
        ================================================================
        GLOBAL GAME CONSTANTS
        ================================================================
        */
        const GAME_CONFIG = {
            ROAD_WIDTH: 26,
            LANE_SIZE: 7,
            SCROLL_SPEED: 0.8,
            MAX_SPEED: 2.8,
            STEER_SPEED: 0.15,
            FRICTION: 0.95,
            POLICE_CATCH_RANGE: 6,
            SPAWN_INTERVAL: 120,
            CAM_MODES: ['CHASE', 'BUMPER', 'TOP']
        };

        const GLB_FILES = [
            { id: 'player', url: 'CAR%20Model.glb' },
            { id: 'police', url: 'Police%20Car.glb' },
            { id: 'block', url: 'Road%20block.glb' },
            { id: 'tree', url: 'Tree.glb' },
            { id: 'bigtree', url: 'Big%20Tree.glb' }
        ];

        /* 
        ================================================================
        CORE GAME CLASS
        ================================================================
        */
        class AnshuCarChase {
            constructor() {
                this.initEngine();
                this.loadAssets();
                this.bindUI();
            }

            initEngine() {
                this.isRunning = false;
                this.assets = {};
                this.speed = 0;
                this.distance = 0;
                this.coins = 0;
                this.camModeIdx = 0;
                this.velocity = new THREE.Vector3();
                this.clock = new THREE.Clock();

                // ThreeJS Scene
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                this.scene.fog = new THREE.Fog(0x87ceeb, 50, 250);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: document.getElementById('game-canvas'),
                    antialias: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;

                // Lights
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
                dirLight.position.set(50, 100, 50);
                dirLight.castShadow = true;
                this.scene.add(dirLight);

                // Containers
                this.roadTiles = [];
                this.traffic = [];
                this.props = [];
                this.keys = { left: false, right: false, brake: false };
                
                window.addEventListener('resize', () => this.onWindowResize());
            }

            loadAssets() {
                const manager = new THREE.LoadingManager();
                const loader = new GLTFLoader(manager);
                const bar = document.getElementById('load-bar');

                manager.onProgress = (u, l, t) => bar.style.width = (l/t*100) + '%';
                manager.onLoad = () => {
                    document.getElementById('screen-loading').classList.add('hidden');
                    document.getElementById('screen-menu').classList.remove('hidden');
                    this.initWorld();
                };

                GLB_FILES.forEach(file => {
                    loader.load(file.url, (glb) => {
                        this.processModel(file.id, glb.scene);
                    }, undefined, (err) => {
                        console.error("Critical GLB Load Fail: " + file.url);
                    });
                });
            }

            processModel(id, scene) {
                // AUTO-SCALING LOGIC: Normalize models to 1 unit = ~1 meter
                const box = new THREE.Box3().setFromObject(scene);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                // Cars should be roughly 4.5 units long, Trees 12 units high
                const targetScale = id.includes('tree') ? 12 : 5;
                const scaleFactor = targetScale / maxDim;
                scene.scale.set(scaleFactor, scaleFactor, scaleFactor);

                scene.traverse(c => {
                    if (c.isMesh) {
                        c.castShadow = true;
                        c.receiveShadow = true;
                    }
                });
                this.assets[id] = scene;
            }

            initWorld() {
                // Setup Player
                this.player = new THREE.Group();
                const car = this.assets['player'].clone();
                car.rotation.y = Math.PI; 
                this.player.add(car);
                this.scene.add(this.player);

                // Setup Police
                this.police = new THREE.Group();
                const pCar = this.assets['police'].clone();
                this.police.add(pCar);
                this.scene.add(this.police);
                
                // Add siren light
                this.sirenLight = new THREE.PointLight(0xff0000, 0, 30);
                this.sirenLight.position.set(0, 2, 0);
                this.police.add(this.sirenLight);

                // Initial Road
                for (let i = 0; i < 12; i++) {
                    this.createRoadSegment(i * 100);
                }

                this.animate();
            }

            createRoadSegment(z) {
                const group = new THREE.Group();
                
                // Asphalt
                const asphalt = new THREE.Mesh(
                    new THREE.PlaneGeometry(30, 100),
                    new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
                );
                asphalt.rotation.x = -Math.PI / 2;
                asphalt.receiveShadow = true;
                group.add(asphalt);

                // Side Grass
                const grass = new THREE.Mesh(
                    new THREE.PlaneGeometry(300, 100),
                    new THREE.MeshStandardMaterial({ color: 0x2d5a27 })
                );
                grass.rotation.x = -Math.PI / 2;
                grass.position.y = -0.1;
                group.add(grass);

                // Markings
                const lineGeo = new THREE.PlaneGeometry(0.5, 12);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                for(let i=0; i<4; i++) {
                    const l = new THREE.Mesh(lineGeo, lineMat);
                    l.rotation.x = -Math.PI/2;
                    l.position.set(-GAME_CONFIG.LANE_SIZE/2, 0.05, -40 + i*25);
                    group.add(l);
                    const r = l.clone();
                    r.position.x = GAME_CONFIG.LANE_SIZE/2;
                    group.add(r);
                }

                // Trees
                for(let i=0; i<5; i++) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const tree = this.assets[Math.random() > 0.5 ? 'tree' : 'bigtree'].clone();
                    tree.position.set(side * (25 + Math.random()*20), 0, (Math.random()-0.5)*100);
                    group.add(tree);
                }

                group.position.z = z;
                this.scene.add(group);
                this.roadTiles.push(group);
            }

            /* 
            ================================================================
            SPAWNING SYSTEM
            ================================================================
            */
            spawnNPC() {
                if (Math.random() < 0.02) {
                    const lane = Math.floor(Math.random() * 3) - 1;
                    const npc = this.assets['player'].clone();
                    
                    // Random NPC color
                    const colors = [0x22c55e, 0x3b82f6, 0xeab308, 0xef4444, 0xffffff];
                    const color = colors[Math.floor(Math.random()*colors.length)];
                    npc.traverse(c => { if(c.isMesh) { c.material = c.material.clone(); c.material.color.setHex(color); }});
                    
                    npc.position.set(lane * GAME_CONFIG.LANE_SIZE, 0, this.player.position.z + 200);
                    npc.userData = { speed: 0.2 + Math.random() * 0.4 };
                    this.scene.add(npc);
                    this.traffic.push(npc);
                }
            }

            spawnItem() {
                if (Math.random() < 0.04) {
                    const lane = Math.floor(Math.random() * 3) - 1;
                    const isBlock = Math.random() > 0.7;
                    
                    if (isBlock) {
                        const block = this.assets['block'].clone();
                        block.position.set(lane * GAME_CONFIG.LANE_SIZE, 0, this.player.position.z + 250);
                        this.scene.add(block);
                        this.props.push({ mesh: block, type: 'OBSTACLE' });
                    } else {
                        const coinGeo = new THREE.TorusGeometry(0.8, 0.2, 8, 24);
                        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.2 });
                        const coin = new THREE.Mesh(coinGeo, coinMat);
                        coin.rotation.y = Math.PI/2;
                        coin.position.set(lane * GAME_CONFIG.LANE_SIZE, 1.5, this.player.position.z + 180);
                        this.scene.add(coin);
                        this.props.push({ mesh: coin, type: 'COIN' });
                    }
                }
            }

            /* 
            ================================================================
            GAME LOOP & UPDATES
            ================================================================
            */
            update(dt) {
                if (!this.isRunning) return;

                // 1. SPEED & ACCEL
                if (this.keys.brake) {
                    this.speed = THREE.MathUtils.lerp(this.speed, -0.3, 0.05);
                } else {
                    this.speed = Math.min(GAME_CONFIG.MAX_SPEED, this.speed + 0.002);
                }
                
                this.distance += this.speed;
                this.player.position.z += this.speed;

                // 2. STEERING (Free Movement)
                if (this.keys.left) this.velocity.x -= GAME_CONFIG.STEER_SPEED;
                if (this.keys.right) this.velocity.x += GAME_CONFIG.STEER_SPEED;
                
                this.velocity.x *= GAME_CONFIG.FRICTION;
                this.player.position.x += this.velocity.x;
                
                // Bounds
                this.player.position.x = THREE.MathUtils.clamp(this.player.position.x, -12, 12);
                this.player.rotation.y = Math.PI + (this.velocity.x * 0.2);
                this.player.rotation.z = -(this.velocity.x * 0.3);

                // 3. POLICE AI (Aggressive)
                const pGap = this.player.position.z - this.police.position.z;
                let pTargetSpeed = this.speed * 0.98;
                if (pGap > 40) pTargetSpeed = this.speed * 1.15; // Speed up if player is far
                
                this.police.position.z += pTargetSpeed;
                this.police.position.x = THREE.MathUtils.lerp(this.police.position.x, this.player.position.x, 0.04);
                
                // Siren Effect
                this.sirenLight.intensity = Math.sin(Date.now() * 0.02) > 0 ? 50 : 0;
                this.sirenLight.color.setHex(Math.sin(Date.now() * 0.02) > 0 ? 0xff0000 : 0x0000ff);

                if (pGap < GAME_CONFIG.POLICE_CATCH_RANGE) this.gameOver();

                // 4. WORLD LOOP & SPAWNS
                this.roadTiles.forEach(tile => {
                    if (this.player.position.z - tile.position.z > 100) tile.position.z += 1200;
                });

                this.spawnNPC();
                this.spawnItem();

                // 5. COLLISIONS
                this.updateEntities();
                
                // 6. CAMERA & AUDIO
                this.updateCamera();
                this.updateAudio();
                this.updateUI();
            }

            updateEntities() {
                // Traffic
                for(let i=this.traffic.length-1; i>=0; i--) {
                    const n = this.traffic[i];
                    n.position.z += n.userData.speed;
                    if(this.player.position.distanceTo(n.position) < 5) {
                        this.speed *= 0.4;
                        this.scene.remove(n);
                        this.traffic.splice(i, 1);
                        this.playSound('snd-crash');
                    }
                    if(this.player.position.z - n.position.z > 30) {
                        this.scene.remove(n);
                        this.traffic.splice(i, 1);
                    }
                }

                // Props
                for(let i=this.props.length-1; i>=0; i--) {
                    const p = this.props[i];
                    if(p.type === 'COIN') p.mesh.rotation.z += 0.1;
                    
                    const dist = this.player.position.distanceTo(p.mesh.position);
                    if(dist < 4) {
                        if(p.type === 'COIN') {
                            this.coins += 100;
                            this.playSound('snd-coin');
                        } else {
                            this.speed *= 0.2;
                            this.playSound('snd-crash');
                        }
                        this.scene.remove(p.mesh);
                        this.props.splice(i, 1);
                    }
                    if(this.player.position.z - p.mesh.position.z > 30) {
                        this.scene.remove(p.mesh);
                        this.props.splice(i, 1);
                    }
                }
            }

            updateCamera() {
                const mode = GAME_CONFIG.CAM_MODES[this.camModeIdx];
                let offset, lookAt;

                if (mode === 'CHASE') {
                    offset = new THREE.Vector3(this.player.position.x * 0.5, 7, this.player.position.z - 16);
                    lookAt = new THREE.Vector3(this.player.position.x, 2, this.player.position.z + 20);
                } else if (mode === 'BUMPER') {
                    offset = new THREE.Vector3(this.player.position.x, 2, this.player.position.z + 2);
                    lookAt = new THREE.Vector3(this.player.position.x, 2, this.player.position.z + 50);
                } else {
                    offset = new THREE.Vector3(0, 50, this.player.position.z + 10);
                    lookAt = new THREE.Vector3(0, 0, this.player.position.z + 30);
                }

                this.camera.position.lerp(offset, 0.1);
                this.camera.lookAt(lookAt);
            }

            updateAudio() {
                const eng = document.getElementById('snd-engine');
                const siren = document.getElementById('snd-siren');
                if(this.isRunning) {
                    eng.playbackRate = 0.5 + (this.speed / GAME_CONFIG.MAX_SPEED);
                    eng.volume = 0.5;
                    siren.volume = 0.4;
                }
            }

            /* 
            ================================================================
            SYSTEM & UI BINDINGS
            ================================================================
            */
            startGame() {
                this.isRunning = true;
                this.speed = 0.5;
                this.distance = 0;
                this.coins = 0;
                this.lane = 0;
                this.player.position.set(0,0,0);
                this.police.position.set(0,0,-45);
                
                document.querySelectorAll('.pointer-events-auto').forEach(el => el.classList.add('hidden'));
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('controls-mobile').classList.remove('hidden');

                // Audio Trigger
                document.getElementById('snd-engine').play();
                document.getElementById('snd-siren').play();
            }

            gameOver() {
                this.isRunning = false;
                document.getElementById('snd-engine').pause();
                document.getElementById('snd-siren').pause();
                this.playSound('snd-crash');

                document.getElementById('screen-gameover').classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('controls-mobile').classList.add('hidden');
                document.getElementById('final-score').innerText = Math.floor(this.distance + this.coins);
            }

            playSound(id) {
                const s = document.getElementById(id);
                s.currentTime = 0;
                s.play().catch(()=>{});
            }

            updateUI() {
                document.getElementById('hud-dist').innerText = Math.floor(this.distance) + ' m';
                document.getElementById('hud-coins').innerText = this.coins;
                document.getElementById('hud-speed').innerText = Math.floor(this.speed * 180);
            }

            bindUI() {
                document.getElementById('btn-start').onclick = () => this.startGame();
                document.getElementById('btn-retry').onclick = () => location.reload();
                document.getElementById('btn-cam-switch').onclick = () => {
                    this.camModeIdx = (this.camModeIdx + 1) % GAME_CONFIG.CAM_MODES.length;
                };

                document.getElementById('btn-fs').onclick = () => {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                    else document.exitFullscreen();
                };

                // Controls
                const setupTouch = (id, key) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; };
                    el.ontouchend = (e) => { e.preventDefault(); this.keys[key] = false; };
                };
                setupTouch('ctrl-left', 'left');
                setupTouch('ctrl-right', 'right');
                setupTouch('ctrl-brake', 'brake');

                window.addEventListener('keydown', (e) => {
                    if(e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = true;
                    if(e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = true;
                    if(e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'Space') this.keys.brake = true;
                });
                window.addEventListener('keyup', (e) => {
                    if(e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = false;
                    if(e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = false;
                    if(e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'Space') this.keys.brake = false;
                });
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const dt = this.clock.getDelta();
                this.update(dt);
                this.renderer.render(this.scene, this.camera);
            }
        }

        // Boot
        new AnshuCarChase();
