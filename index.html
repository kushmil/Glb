<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANSHU CAR CHASE</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff0040;
            --blue: #00d9ff;
            --ui-bg: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #87ceeb; /* Sky Blue */
            font-family: 'Segoe UI', Impact, sans-serif;
            color: white;
            touch-action: none;
        }

        #game-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* AUTO-LANDSCAPE HACK */
        @media screen and (orientation: portrait) {
            #main-container {
                width: 100vh !important;
                height: 100vw !important;
                transform: rotate(90deg);
                transform-origin: center center;
            }
        }

        #main-container {
            position: relative;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }

        canvas { width: 100% !important; height: 100% !important; display: block; }

        /* UI OVERLAYS */
        .screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        h1 {
            font-size: clamp(2rem, 15vh, 6rem);
            margin: 0;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 20px var(--red);
            font-style: italic;
        }

        button {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--red);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-card {
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 8px;
            border-bottom: 3px solid var(--blue);
        }

        .coin-count { color: var(--gold); font-weight: bold; }

        /* ARROW CONTROLS */
        .ctrl-btn {
            position: absolute;
            bottom: 10%;
            width: 90px; height: 90px;
            background: rgba(255,255,255,0.2);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            z-index: 20;
            user-select: none;
        }

        #btn-left { left: 5%; }
        #btn-right { right: 5%; }
        #btn-brake { bottom: 5%; left: 50%; transform: translateX(-50%); width: 120px; border-radius: 10px; font-size: 1rem; }

        /* LOADING BAR */
        .loader { width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 20px; }
        #load-progress { width: 0%; height: 100%; background: var(--red); transition: 0.1s; }

    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="main-container">

            <!-- HUD -->
            <div id="hud" class="hidden">
                <div class="hud-card">
                    <small>COINS</small>
                    <div class="coin-count" id="coin-txt">0</div>
                </div>
                <div class="hud-card">
                    <small>DISTANCE</small>
                    <div id="dist-txt">0m</div>
                </div>
            </div>

            <!-- Side Arrow Controls -->
            <div id="ctrl-layer" class="hidden">
                <div class="ctrl-btn" id="btn-left">⬅️</div>
                <div class="ctrl-btn" id="btn-right">➡️</div>
                <div class="ctrl-btn" id="btn-brake">BRAKE</div>
            </div>

            <!-- Loading Screen -->
            <div id="screen-loading" class="screen">
                <h1>ANSHU</h1>
                <p>LOADING GLB MODELS...</p>
                <div class="loader"><div id="load-progress"></div></div>
            </div>

            <!-- Start Screen -->
            <div id="screen-start" class="screen hidden">
                <h1>ANSHU</h1>
                <p style="letter-spacing: 5px; color: var(--blue);">POLICE CHASE</p>
                <button id="start-btn">▶ START GAME</button>
            </div>

            <!-- Game Over -->
            <div id="screen-over" class="screen hidden">
                <h1 style="color: var(--red);">BUSTED</h1>
                <p id="final-stats" style="font-size: 1.5rem;">Coins: 0 | Dist: 0m</p>
                <button id="retry-btn">RETRY</button>
            </div>

        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        class Game {
            constructor() {
                this.initEngine();
                this.loadAssets();
                this.bindInputs();
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb); // Day Sky
                this.scene.fog = new THREE.Fog(0x87ceeb, 50, 150);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                document.getElementById('main-container').appendChild(this.renderer.domElement);

                // Daytime Lighting
                const ambient = new THREE.AmbientLight(0xffffff, 0.8);
                this.scene.add(ambient);

                this.sun = new THREE.DirectionalLight(0xffffff, 1.5);
                this.sun.position.set(50, 100, 50);
                this.sun.castShadow = true;
                this.sun.shadow.camera.left = -50;
                this.sun.shadow.camera.right = 50;
                this.sun.shadow.camera.top = 50;
                this.sun.shadow.camera.bottom = -50;
                this.scene.add(this.sun);

                // State
                this.assets = {};
                this.isRunning = false;
                this.speed = 0;
                this.dist = 0;
                this.coinsCollected = 0;
                this.lane = 0; // -1, 0, 1
                this.roadTiles = [];
                this.obstacles = [];
                this.coins = [];
                this.keys = { left: false, right: false, brake: false };
                this.clock = new THREE.Clock();
            }

            loadAssets() {
                const manager = new THREE.LoadingManager();
                const loader = new GLTFLoader(manager);
                const progress = document.getElementById('load-progress');

                manager.onProgress = (u, l, t) => progress.style.width = (l/t*100) + '%';
                manager.onLoad = () => {
                    document.getElementById('screen-loading').classList.add('hidden');
                    document.getElementById('screen-start').classList.remove('hidden');
                    this.setupGameObjects();
                };

                const files = [
                    { id: 'player', url: 'CAR Model.glb' },
                    { id: 'police', url: 'Police Car.glb' },
                    { id: 'block', url: 'Road block.glb' },
                    { id: 'tree', url: 'Tree.glb' },
                    { id: 'bigtree', url: 'Big Tree.glb' }
                ];

                files.forEach(f => {
                    loader.load(f.url, (glb) => {
                        this.assets[f.id] = glb.scene;
                        glb.scene.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});
                    }, undefined, () => {
                        this.assets[f.id] = new THREE.Mesh(new THREE.BoxGeometry(2,1,4), new THREE.MeshPhongMaterial({color: 0x555555}));
                    });
                });
            }

            setupGameObjects() {
                // Player
                this.player = new THREE.Group();
                const car = this.assets['player'].clone();
                car.rotation.y = Math.PI;
                this.player.add(car);
                this.scene.add(this.player);

                // Police
                this.police = this.assets['police'].clone();
                this.police.position.set(0, 0, -30);
                this.scene.add(this.police);

                // Road Loop
                for(let i=0; i<6; i++) {
                    this.createRoad(i * 100);
                }

                this.animate();
            }

            createRoad(z) {
                const group = new THREE.Group();
                const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 100), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                road.rotation.x = -Math.PI/2;
                road.receiveShadow = true;
                group.add(road);

                const lineGeo = new THREE.PlaneGeometry(0.5, 15);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                for(let i=0; i<4; i++) {
                    const l = new THREE.Mesh(lineGeo, lineMat);
                    l.rotation.x = -Math.PI/2;
                    l.position.set(-3.5, 0.02, -37.5 + i*25);
                    group.add(l);
                    const r = l.clone();
                    r.position.set(3.5, 0.02, -37.5 + i*25);
                    group.add(r);
                }

                // Trees
                for(let i=0; i<6; i++) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const tree = this.assets[Math.random() > 0.5 ? 'tree' : 'bigtree'].clone();
                    tree.position.set(side * (13 + Math.random()*5), 0, (Math.random()-0.5)*100);
                    group.add(tree);
                }

                group.position.z = z;
                this.scene.add(group);
                this.roadTiles.push(group);
            }

            spawnCoin() {
                if(Math.random() < 0.05) {
                    const lane = Math.floor(Math.random()*3)-1;
                    const geo = new THREE.TorusGeometry(0.6, 0.15, 8, 16);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.2 });
                    const coin = new THREE.Mesh(geo, mat);
                    coin.position.set(lane * 5, 1.2, this.player.position.z + 150);
                    this.scene.add(coin);
                    this.coins.push(coin);
                }
            }

            spawnObstacle() {
                if(Math.random() < 0.02) {
                    const lane = Math.floor(Math.random()*3)-1;
                    const block = this.assets['block'].clone();
                    block.position.set(lane * 5, 0, this.player.position.z + 200);
                    this.scene.add(block);
                    this.obstacles.push(block);
                }
            }

            bindInputs() {
                const startBtn = document.getElementById('start-btn');
                startBtn.onclick = () => {
                    this.enterFullscreen();
                    this.startGame();
                };

                document.getElementById('retry-btn').onclick = () => this.startGame();

                // Touch Controls
                const bind = (id, key) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; el.style.background = "rgba(255,255,255,0.5)"; };
                    el.ontouchend = (e) => { e.preventDefault(); this.keys[key] = false; el.style.background = "rgba(255,255,255,0.2)"; };
                };
                bind('btn-left', 'left');
                bind('btn-right', 'right');
                bind('btn-brake', 'brake');

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            enterFullscreen() {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }

            startGame() {
                this.isRunning = true;
                this.dist = 0;
                this.speed = 0.5;
                this.coinsCollected = 0;
                this.lane = 0;
                this.player.position.set(0,0,0);
                this.police.position.set(0,0,-30);
                
                this.obstacles.forEach(o => this.scene.remove(o));
                this.coins.forEach(c => this.scene.remove(c));
                this.obstacles = [];
                this.coins = [];

                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('ctrl-layer').classList.remove('hidden');
            }

            gameOver() {
                this.isRunning = false;
                document.getElementById('screen-over').classList.remove('hidden');
                document.getElementById('final-stats').innerText = `Coins: ${this.coinsCollected} | Dist: ${Math.floor(this.dist)}m`;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const dt = this.clock.getDelta();

                if(this.isRunning) {
                    // Movement
                    if(this.keys.brake) this.speed = THREE.MathUtils.lerp(this.speed, 0.2, 0.05);
                    else this.speed = Math.min(2.2, this.speed + 0.001);

                    this.dist += this.speed;
                    this.player.position.z += this.speed;

                    if(this.keys.left) this.lane = Math.max(-1.2, this.lane - 0.05);
                    if(this.keys.right) this.lane = Math.min(1.2, this.lane + 0.05);

                    const tx = this.lane * 5;
                    this.player.position.x = THREE.MathUtils.lerp(this.player.position.x, tx, 0.1);
                    this.player.rotation.z = (tx - this.player.position.x) * 0.1;
                    this.player.rotation.y = Math.PI + (this.player.position.x - tx) * 0.2;

                    // Police
                    const gap = this.player.position.z - this.police.position.z;
                    this.police.position.z += (gap > 40) ? this.speed * 1.1 : this.speed * 0.98;
                    this.police.position.x = THREE.MathUtils.lerp(this.police.position.x, this.player.position.x, 0.03);
                    
                    if(gap < 4.5) this.gameOver();

                    // Loops & Spawns
                    this.roadTiles.forEach(t => { if(this.player.position.z - t.position.z > 100) t.position.z += 600; });
                    this.spawnObstacle();
                    this.spawnCoin();

                    // Coin Collision & Rotation
                    this.coins.forEach((c, i) => {
                        c.rotation.y += 0.05;
                        const d = this.player.position.distanceTo(c.position);
                        if(d < 3) {
                            this.coinsCollected += 10;
                            this.scene.remove(c);
                            this.coins.splice(i, 1);
                        }
                        if(this.player.position.z - c.position.z > 20) {
                            this.scene.remove(c);
                            this.coins.splice(i, 1);
                        }
                    });

                    // Obstacle Collision
                    this.obstacles.forEach((o, i) => {
                        const dx = Math.abs(o.position.x - this.player.position.x);
                        const dz = Math.abs(o.position.z - this.player.position.z);
                        if(dx < 2.5 && dz < 3.5) {
                            this.speed *= 0.4;
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        }
                        if(this.player.position.z - o.position.z > 20) {
                            this.scene.remove(o);
                            this.obstacles.splice(i, 1);
                        }
                    });

                    // Camera
                    this.camera.position.lerp(new THREE.Vector3(this.player.position.x*0.5, 6, this.player.position.z - 12), 0.1);
                    this.camera.lookAt(this.player.position.x, 2, this.player.position.z + 15);

                    // UI
                    document.getElementById('dist-txt').innerText = Math.floor(this.dist) + 'm';
                    document.getElementById('coin-txt').innerText = this.coinsCollected;
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        new Game();
    </script>
</body>
</html>
